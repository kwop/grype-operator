# This rule is not used by the project grype-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to security.paramedic.tech resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: grype-operator
    app.kubernetes.io/managed-by: kustomize
  name: imagescan-viewer-role
rules:
- apiGroups:
  - security.paramedic.tech
  resources:
  - imagescans
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - security.paramedic.tech
  resources:
  - imagescans/status
  verbs:
  - get
